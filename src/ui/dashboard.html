<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAS Control</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg-0: #08080c;
    --bg-1: #0e0e14;
    --bg-2: #16161f;
    --bg-3: #1e1e2a;
    --border: #2a2a3a;
    --border-subtle: #1e1e2e;
    --text-0: #e8e8f0;
    --text-1: #b0b0c0;
    --text-2: #707088;
    --text-3: #505068;
    --amber: #e8a020;
    --amber-dim: #c08018;
    --amber-glow: rgba(232, 160, 32, 0.12);
    --green: #30d060;
    --green-dim: rgba(48, 208, 96, 0.15);
    --blue: #4090f0;
    --blue-dim: rgba(64, 144, 240, 0.15);
    --yellow: #e0b020;
    --yellow-dim: rgba(224, 176, 32, 0.15);
    --red: #f04040;
    --red-dim: rgba(240, 64, 64, 0.15);
    --font: "SF Mono", "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", "Liberation Mono", monospace;
    --sidebar-w: 260px;
    --statusbar-h: 32px;
    --header-h: 44px;
    --send-h: 56px;
  }

  html, body {
    height: 100%;
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT SHELL ── */
  #app {
    display: grid;
    grid-template-rows: var(--header-h) 1fr var(--statusbar-h);
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-areas:
      "header header"
      "sidebar main"
      "status status";
    height: 100vh;
  }

  /* ── HEADER ── */
  #header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  #header .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--amber);
    text-transform: uppercase;
  }

  #header .brand .sigil {
    width: 20px;
    height: 20px;
    background: var(--amber);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    flex-shrink: 0;
  }

  #hamburger {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-1);
    font-size: 18px;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 3px;
    font-family: var(--font);
  }
  #hamburger:hover { color: var(--amber); border-color: var(--amber-dim); }

  /* ── SIDEBAR ── */
  #sidebar {
    grid-area: sidebar;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #sidebar-header .count {
    color: var(--text-3);
    font-weight: 400;
  }

  #tree-container {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  #tree-container::-webkit-scrollbar { width: 4px; }
  #tree-container::-webkit-scrollbar-track { background: transparent; }
  #tree-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Tree nodes */
  .tree-node { user-select: none; }

  .tree-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 12px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tree-row:hover { background: var(--bg-3); }
  .tree-row.active { background: var(--amber-glow); color: var(--amber); }

  .tree-chevron {
    width: 14px;
    text-align: center;
    color: var(--text-3);
    font-size: 10px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .tree-chevron.open { transform: rotate(90deg); }
  .tree-chevron.leaf { visibility: hidden; }

  .tree-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tree-prefix .tree-label { color: var(--text-2); }

  .tree-children { display: none; }
  .tree-children.open { display: block; }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.ready { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .status-dot.running { background: var(--blue); box-shadow: 0 0 4px var(--blue); animation: pulse-blue 2s ease-in-out infinite; }
  .status-dot.queued { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
  .status-dot.error { background: var(--red); box-shadow: 0 0 4px var(--red); }

  @keyframes pulse-blue {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MAIN AREA ── */
  #main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-0);
  }

  /* Filter bar */
  #filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-1);
  }

  #filter-bar label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    flex-shrink: 0;
  }

  #filter-input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }
  #filter-input:focus { border-color: var(--amber-dim); }
  #filter-input::placeholder { color: var(--text-3); }

  /* Log stream area */
  #log-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.6;
  }

  #log-area::-webkit-scrollbar { width: 6px; }
  #log-area::-webkit-scrollbar-track { background: transparent; }
  #log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #log-placeholder {
    color: var(--text-3);
    font-style: italic;
    padding-top: 40px;
    text-align: center;
  }
  #log-placeholder .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

  /* Log line styles */
  .log-line {
    white-space: pre-wrap;
    word-break: break-all;
    padding: 1px 0;
  }
  .log-ts {
    color: var(--text-3);
    margin-right: 8px;
    user-select: none;
  }
  .log-msg { }
  .log-line.color-blue .log-msg { color: var(--blue); }
  .log-line.color-green .log-msg { color: var(--green); }
  .log-line.color-red .log-msg { color: var(--red); }
  .log-line.color-yellow .log-msg { color: var(--yellow); }
  .log-line.color-default .log-msg { color: var(--text-1); }

  #resume-btn {
    display: none;
    position: sticky;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 16px;
    border-radius: 3px;
    cursor: pointer;
    z-index: 5;
  }
  #resume-btn:hover { background: var(--amber-glow); }

  /* Instance detail view */
  #detail-view { display: none; flex-direction: column; overflow: hidden; }
  #detail-view.visible { display: flex; flex: 1; }
  #log-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #log-view.hidden { display: none; }

  #detail-back {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-1);
    cursor: pointer;
    color: var(--text-2);
    font-size: 11px;
    font-family: var(--font);
    border: none;
    width: 100%;
    text-align: left;
    transition: color 0.1s;
  }
  #detail-back:hover { color: var(--amber); }

  #detail-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  #detail-content::-webkit-scrollbar { width: 6px; }
  #detail-content::-webkit-scrollbar-track { background: transparent; }
  #detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .detail-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-0);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .detail-label, .detail-value {
    padding: 8px 12px;
    background: var(--bg-1);
  }

  .detail-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-2);
    background: var(--bg-2);
  }

  .detail-value {
    font-size: 12px;
    color: var(--text-1);
    word-break: break-all;
  }

  .detail-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin: 20px 0 8px;
  }

  .detail-prompt {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    font-size: 12px;
    color: var(--text-1);
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 200px;
    overflow: hidden;
    position: relative;
    transition: max-height 0.3s;
  }
  .detail-prompt.expanded { max-height: none; }

  .detail-prompt .show-more {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 12px 8px;
    background: linear-gradient(transparent, var(--bg-2));
    cursor: pointer;
    color: var(--amber);
    font-size: 11px;
    font-family: var(--font);
    border: none;
    text-align: left;
  }
  .detail-prompt.expanded .show-more { display: none; }

  .mcp-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .mcp-item {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-1);
  }

  /* Send message panel */
  #send-panel {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-1);
    flex-shrink: 0;
  }

  #send-panel select,
  #send-panel input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }
  #send-panel select:focus,
  #send-panel input:focus { border-color: var(--amber-dim); }

  #send-instance { width: 200px; flex-shrink: 0; }
  #send-prompt { flex: 1; }
  #send-prompt::placeholder { color: var(--text-3); }

  #send-btn {
    background: var(--bg-3);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  #send-btn:hover { background: var(--amber-glow); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── STATUS BAR ── */
  #status-bar {
    grid-area: status;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 16px;
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-2);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .status-indicator .dot.connected { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .status-indicator .dot.disconnected { background: var(--red); box-shadow: 0 0 4px var(--red); }

  .status-metrics {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }

  .status-metric { color: var(--text-3); }
  .status-metric b { color: var(--text-1); font-weight: 500; }

  /* ── SCAN LINE EFFECT (SUBTLE) ── */
  #app::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    z-index: 100;
  }

  /* ── EMPTY STATE ── */
  .empty-tree {
    padding: 20px 12px;
    text-align: center;
    color: var(--text-3);
    font-size: 11px;
    font-style: italic;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "main"
        "status";
    }
    #sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: var(--statusbar-h);
      width: var(--sidebar-w);
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    #sidebar.open { transform: translateX(0); }
    #hamburger { display: block; }
  }

  /* ── NUKE BUTTONS ── */
  .nuke-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-3);
    font-family: var(--font);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .tree-row:hover .nuke-btn { opacity: 1; }
  .nuke-btn:hover { color: var(--red); border-color: var(--red-dim); }

  .nuke-btn-detail {
    background: none;
    border: 1px solid var(--red-dim);
    color: var(--red);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    margin-left: auto;
    transition: background 0.1s;
  }
  .nuke-btn-detail:hover { background: var(--red-dim); }

  .nuke-all-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }
  .nuke-all-btn:hover { color: var(--red); border-color: var(--red-dim); }

  /* ── CONFIRM DIALOG ── */
  .dialog-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .dialog-box {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    max-width: 400px;
    width: 90%;
  }

  .dialog-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-0);
    margin-bottom: 12px;
  }

  .dialog-msg {
    font-size: 12px;
    color: var(--text-1);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .dialog-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .dialog-cancel {
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 3px;
    cursor: pointer;
  }
  .dialog-cancel:hover { color: var(--text-0); }

  .dialog-confirm {
    background: var(--red-dim);
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
  }
  .dialog-confirm:hover { background: var(--red); color: var(--text-0); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font);
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 4px;
    z-index: 300;
    animation: toast-in 0.2s ease, toast-out 0.3s ease 2.5s forwards;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%); } }
  @keyframes toast-out { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

  /* ── INLINE RESPONSE ── */
  #response-area {
    display: none;
    background: var(--bg-2);
    border-top: 1px solid var(--border-subtle);
    padding: 10px 16px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #response-area.visible { display: block; }

  #response-area::-webkit-scrollbar { width: 4px; }
  #response-area::-webkit-scrollbar-track { background: transparent; }
  #response-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .response-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .response-close {
    background: none;
    border: none;
    color: var(--text-3);
    font-family: var(--font);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
  }
  .response-close:hover { color: var(--text-0); }

  #response-content {
    color: var(--text-1);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .response-tool {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    margin: 4px 0;
    color: var(--yellow);
    font-size: 11px;
  }

  .response-summary {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--border-subtle);
    font-size: 11px;
    color: var(--text-2);
  }

  /* ── LOADING SKELETON ── */
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  .skeleton {
    height: 14px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.5s infinite;
    margin: 6px 12px;
  }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header id="header">
    <div style="display:flex;align-items:center;gap:12px">
      <button id="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <div class="brand">
        <div class="sigil"></div>
        <span>AAS Control</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:10px;color:var(--text-3);letter-spacing:0.1em">AGENT SDK</span>
      <button class="nuke-all-btn" onclick="window.__nukeAll()">Nuke All</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span>Instances</span>
      <span class="count" id="instance-count-label">0</span>
    </div>
    <div id="tree-container">
      <div class="skeleton" style="width:70%"></div>
      <div class="skeleton" style="width:50%"></div>
      <div class="skeleton" style="width:60%"></div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div id="main">
    <!-- Log view (default) -->
    <div id="log-view">
      <div id="filter-bar">
        <label for="filter-input">Filter</label>
        <input id="filter-input" type="text" placeholder="Type prefix to filter logs...">
      </div>
      <div id="log-area">
        <div id="log-placeholder">
          <div class="icon">&#9641;</div>
          Awaiting log stream&hellip;<br>
          <span style="font-size:11px;color:var(--text-3)">Logs will appear here when connected</span>
        </div>
        <button id="resume-btn" onclick="window.__resumeAutoScroll()">Resume auto-scroll</button>
      </div>
    </div>

    <!-- Detail view (shown on instance click) -->
    <div id="detail-view">
      <button id="detail-back" onclick="showLogView()">
        <span>&larr;</span> Back to logs
      </button>
      <div id="detail-content"></div>
    </div>

    <!-- Response area (inline SSE response) -->
    <div id="response-area">
      <div class="response-header">
        <span class="response-label">Response</span>
        <button class="response-close" onclick="window.__closeResponse()">&times;</button>
      </div>
      <div id="response-content"></div>
    </div>

    <!-- Send panel -->
    <div id="send-panel">
      <select id="send-instance" title="Select instance">
        <option value="">Select instance...</option>
      </select>
      <input id="send-prompt" type="text" placeholder="Message...">
      <button id="send-btn" onclick="window.__sendMessage()">Send</button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <footer id="status-bar">
    <div class="status-indicator">
      <div class="dot connected" id="conn-dot"></div>
      <span id="conn-label">Connected</span>
    </div>
    <div class="status-metrics">
      <span class="status-metric">Instances <b id="stat-instances">0</b></span>
      <span class="status-metric">Running <b id="stat-running">0</b></span>
      <span class="status-metric">Queued <b id="stat-queued">0</b></span>
    </div>
  </footer>
</div>

<script>
(function () {
  "use strict";

  // ── STATE ──
  let instances = [];
  let selectedInstance = null;
  let activeFilter = "";
  let refreshTimer = null;

  // ── DOM REFS ──
  const treeContainer = document.getElementById("tree-container");
  const logView = document.getElementById("log-view");
  const detailView = document.getElementById("detail-view");
  const detailContent = document.getElementById("detail-content");
  const filterInput = document.getElementById("filter-input");
  const sendInstanceSelect = document.getElementById("send-instance");
  const sidebar = document.getElementById("sidebar");
  const statInstances = document.getElementById("stat-instances");
  const statRunning = document.getElementById("stat-running");
  const statQueued = document.getElementById("stat-queued");
  const instanceCountLabel = document.getElementById("instance-count-label");

  // ── FETCH INSTANCES ──
  async function fetchInstances() {
    try {
      const res = await fetch("/v1/instances");
      if (!res.ok) return;
      instances = await res.json();
      renderTree();
      updateStats();
      updateSendDropdown();
      // If detail view is open, re-render it with fresh data
      if (selectedInstance) {
        const fresh = instances.find(function (i) { return i.name === selectedInstance; });
        if (fresh) renderDetail(fresh);
      }
    } catch (_) {
      // fail silently — retry on next tick
    }
  }

  // ── TREE BUILDING ──
  function buildTreeData(items) {
    var root = { children: {}, instances: [] };
    items.forEach(function (inst) {
      var parts = inst.name.split("/");
      var node = root;
      for (var i = 0; i < parts.length - 1; i++) {
        var seg = parts[i];
        if (!node.children[seg]) {
          node.children[seg] = { children: {}, instances: [] };
        }
        node = node.children[seg];
      }
      node.instances.push(inst);
    });
    return root;
  }

  function renderTree() {
    var data = buildTreeData(instances);
    var html = renderTreeNode(data, 0, "");
    if (!html) {
      treeContainer.innerHTML = '<div class="empty-tree">No instances provisioned</div>';
    } else {
      treeContainer.innerHTML = html;
    }
    instanceCountLabel.textContent = instances.length;
  }

  function renderTreeNode(node, depth, pathSoFar) {
    var html = "";
    var pad = depth * 16;

    // Sort prefix keys
    var prefixKeys = Object.keys(node.children).sort();
    prefixKeys.forEach(function (key) {
      var fullPath = pathSoFar ? pathSoFar + "/" + key : key;
      var child = node.children[key];
      var isOpen = true; // default open
      var childHtml = renderTreeNode(child, depth + 1, fullPath);

      html += '<div class="tree-node tree-prefix">';
      html += '<div class="tree-row" style="padding-left:' + (12 + pad) + 'px" onclick="window.__togglePrefix(this, \'' + escHtml(fullPath) + '\')">';
      html += '<span class="tree-chevron open">&#9654;</span>';
      html += '<span class="tree-label">' + escHtml(key) + '/</span>';
      html += '<button class="nuke-btn" onclick="window.__nukePrefix(\'' + escHtml(fullPath) + '\', event)" title="Nuke prefix">x</button>';
      html += '</div>';
      html += '<div class="tree-children open">' + childHtml + '</div>';
      html += '</div>';
    });

    // Sort instances by leaf name
    var sorted = node.instances.slice().sort(function (a, b) {
      var aLeaf = a.name.split("/").pop();
      var bLeaf = b.name.split("/").pop();
      return aLeaf.localeCompare(bLeaf);
    });

    sorted.forEach(function (inst) {
      var leaf = inst.name.split("/").pop();
      var isActive = selectedInstance === inst.name;
      html += '<div class="tree-node">';
      html += '<div class="tree-row' + (isActive ? ' active' : '') + '" style="padding-left:' + (12 + pad) + 'px" onclick="window.__selectInstance(\'' + escHtml(inst.name) + '\')">';
      html += '<span class="tree-chevron leaf">&#9654;</span>';
      html += '<span class="status-dot ' + inst.status + '"></span>';
      html += '<span class="tree-label">' + escHtml(leaf) + '</span>';
      html += '</div>';
      html += '</div>';
    });

    return html;
  }

  function escHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  // ── TREE INTERACTIONS ──
  window.__togglePrefix = function (row, prefix) {
    var children = row.nextElementSibling;
    var chevron = row.querySelector(".tree-chevron");
    if (!children) return;
    var isOpen = children.classList.contains("open");
    if (isOpen) {
      children.classList.remove("open");
      chevron.classList.remove("open");
    } else {
      children.classList.add("open");
      chevron.classList.add("open");
    }
  };

  window.__selectInstance = function (name) {
    selectedInstance = name;
    var inst = instances.find(function (i) { return i.name === name; });
    if (!inst) return;
    renderDetail(inst);
    showDetailView();
    renderTree(); // re-render to update active state

    // Pre-fill send dropdown
    sendInstanceSelect.value = name;

    // Close sidebar on mobile
    if (window.innerWidth <= 768) {
      sidebar.classList.remove("open");
    }
  };

  // ── DETAIL VIEW ──
  function renderDetail(inst) {
    var statusClass = inst.status || "ready";
    var promptText = inst.systemPrompt || "(none)";
    var needsShowMore = promptText.length > 500;
    var displayPrompt = needsShowMore ? promptText.substring(0, 500) + "..." : promptText;

    var mcpHtml = "";
    if (inst.mcpServers && inst.mcpServers.length > 0) {
      mcpHtml = '<ul class="mcp-list">';
      inst.mcpServers.forEach(function (s) {
        mcpHtml += '<li class="mcp-item">' + escHtml(s.name || s.url || JSON.stringify(s)) + '</li>';
      });
      mcpHtml += '</ul>';
    } else {
      mcpHtml = '<span style="color:var(--text-3);font-style:italic">None configured</span>';
    }

    var lastInvoked = inst.lastInvokedAt
      ? new Date(inst.lastInvokedAt).toLocaleString()
      : "Never";

    detailContent.innerHTML =
      '<div class="detail-header">' +
        '<span class="status-dot ' + statusClass + '"></span>' +
        '<span class="detail-name">' + escHtml(inst.name) + '</span>' +
        '<button class="nuke-btn-detail" onclick="window.__nukeInstance(\'' + escHtml(inst.name) + '\')">Delete</button>' +
      '</div>' +
      '<div class="detail-grid">' +
        '<div class="detail-label">Status</div><div class="detail-value">' + escHtml(inst.status) + '</div>' +
        '<div class="detail-label">Model</div><div class="detail-value">' + escHtml(inst.model || "—") + '</div>' +
        '<div class="detail-label">Max Turns</div><div class="detail-value">' + (inst.maxTurns ?? "—") + '</div>' +
        '<div class="detail-label">Budget (USD)</div><div class="detail-value">' + (inst.maxBudgetUsd != null ? "$" + inst.maxBudgetUsd : "—") + '</div>' +
        '<div class="detail-label">Session ID</div><div class="detail-value">' + escHtml(inst.sessionId || "—") + '</div>' +
        '<div class="detail-label">Queue Depth</div><div class="detail-value">' + (inst.queueDepth ?? 0) + '</div>' +
        '<div class="detail-label">Invocations</div><div class="detail-value">' + (inst.invocationCount ?? 0) + '</div>' +
        '<div class="detail-label">Last Invoked</div><div class="detail-value">' + escHtml(lastInvoked) + '</div>' +
        '<div class="detail-label">Created</div><div class="detail-value">' + (inst.createdAt ? new Date(inst.createdAt).toLocaleString() : "—") + '</div>' +
      '</div>' +
      '<div class="detail-section-title">System Prompt</div>' +
      '<div class="detail-prompt" id="detail-prompt-box">' +
        escHtml(needsShowMore ? displayPrompt : promptText) +
        (needsShowMore ? '<button class="show-more" onclick="window.__expandPrompt()">Show more&hellip;</button>' : '') +
      '</div>' +
      '<div class="detail-section-title">MCP Servers</div>' +
      mcpHtml;
  }

  window.__expandPrompt = function () {
    var box = document.getElementById("detail-prompt-box");
    if (!box) return;
    var inst = instances.find(function (i) { return i.name === selectedInstance; });
    if (!inst) return;
    box.textContent = inst.systemPrompt || "";
    box.classList.add("expanded");
  };

  // ── VIEW SWITCHING ──
  function showDetailView() {
    logView.classList.add("hidden");
    detailView.classList.add("visible");
  }

  function showLogView() {
    selectedInstance = null;
    detailView.classList.remove("visible");
    logView.classList.remove("hidden");
    renderTree();
  }
  window.showLogView = showLogView;

  // ── STATS ──
  function updateStats() {
    statInstances.textContent = instances.length;
    statRunning.textContent = instances.filter(function (i) { return i.status === "running"; }).length;
    var queuedCount = instances.filter(function (i) { return (i.queueDepth || 0) > 0; }).length;
    statQueued.textContent = queuedCount;
  }

  // ── SEND DROPDOWN ──
  function updateSendDropdown() {
    var current = sendInstanceSelect.value;
    var html = '<option value="">Select instance...</option>';
    instances.slice().sort(function (a, b) { return a.name.localeCompare(b.name); }).forEach(function (inst) {
      var sel = inst.name === current ? " selected" : "";
      html += '<option value="' + escHtml(inst.name) + '"' + sel + '>' + escHtml(inst.name) + '</option>';
    });
    sendInstanceSelect.innerHTML = html;
  }

  // ── SIDEBAR TOGGLE (MOBILE) ──
  window.toggleSidebar = function () {
    sidebar.classList.toggle("open");
  };

  // ── FILTER INPUT ──
  filterInput.addEventListener("input", function () {
    activeFilter = this.value.trim().toLowerCase();
    applyClientFilter();
  });

  // ── LOG STREAM (SSE) ──
  var logArea = document.getElementById("log-area");
  var logPlaceholder = document.getElementById("log-placeholder");
  var resumeBtn = document.getElementById("resume-btn");
  var connDot = document.getElementById("conn-dot");
  var connLabel = document.getElementById("conn-label");
  var autoScroll = true;
  var MAX_LOG_LINES = 1000;
  var eventSource = null;
  var reconnectTimer = null;

  function getColorClass(level, message) {
    if (level === "error" || message.indexOf("error") !== -1) return "color-red";
    if (message.indexOf("provision") !== -1) return "color-blue";
    if (message.indexOf("invoke") !== -1) return "color-green";
    if (message.indexOf("tool_use") !== -1) return "color-yellow";
    return "color-default";
  }

  function formatTime(isoStr) {
    var d = new Date(isoStr);
    var hh = String(d.getHours()).padStart(2, "0");
    var mm = String(d.getMinutes()).padStart(2, "0");
    var ss = String(d.getSeconds()).padStart(2, "0");
    return hh + ":" + mm + ":" + ss;
  }

  function appendLogLine(line) {
    // Remove placeholder on first line
    if (logPlaceholder && logPlaceholder.parentNode) {
      logPlaceholder.parentNode.removeChild(logPlaceholder);
      logPlaceholder = null;
    }

    var colorClass = getColorClass(line.level, line.message);
    var div = document.createElement("div");
    div.className = "log-line " + colorClass;
    div.setAttribute("data-msg", line.message.toLowerCase());

    var tsSpan = document.createElement("span");
    tsSpan.className = "log-ts";
    tsSpan.textContent = formatTime(line.timestamp);

    var msgSpan = document.createElement("span");
    msgSpan.className = "log-msg";
    msgSpan.textContent = line.message;

    div.appendChild(tsSpan);
    div.appendChild(msgSpan);

    // Apply client-side filter visibility
    if (activeFilter && div.getAttribute("data-msg").indexOf(activeFilter) === -1) {
      div.style.display = "none";
    }

    // Insert before resume button
    if (resumeBtn) {
      logArea.insertBefore(div, resumeBtn);
    } else {
      logArea.appendChild(div);
    }

    // Enforce max lines
    var lines = logArea.querySelectorAll(".log-line");
    while (lines.length > MAX_LOG_LINES) {
      lines[0].parentNode.removeChild(lines[0]);
      lines = logArea.querySelectorAll(".log-line");
    }

    // Auto-scroll
    if (autoScroll) {
      logArea.scrollTop = logArea.scrollHeight;
    }
  }

  function applyClientFilter() {
    var lines = logArea.querySelectorAll(".log-line");
    for (var i = 0; i < lines.length; i++) {
      var msg = lines[i].getAttribute("data-msg") || "";
      if (!activeFilter || msg.indexOf(activeFilter) !== -1) {
        lines[i].style.display = "";
      } else {
        lines[i].style.display = "none";
      }
    }
  }

  // Detect user scroll
  logArea.addEventListener("scroll", function () {
    var atBottom = logArea.scrollHeight - logArea.scrollTop - logArea.clientHeight < 40;
    if (atBottom) {
      autoScroll = true;
      resumeBtn.style.display = "none";
    } else {
      autoScroll = false;
      resumeBtn.style.display = "block";
    }
  });

  window.__resumeAutoScroll = function () {
    autoScroll = true;
    resumeBtn.style.display = "none";
    logArea.scrollTop = logArea.scrollHeight;
  };

  function setConnectionStatus(connected) {
    if (connected) {
      connDot.className = "dot connected";
      connLabel.textContent = "Connected";
    } else {
      connDot.className = "dot disconnected";
      connLabel.textContent = "Disconnected";
    }
  }

  function connectLogStream() {
    if (eventSource) {
      eventSource.close();
    }

    eventSource = new EventSource("/v1/logs");

    eventSource.addEventListener("open", function () {
      setConnectionStatus(true);
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    });

    eventSource.addEventListener("log", function (e) {
      try {
        var line = JSON.parse(e.data);
        appendLogLine(line);
      } catch (_) { /* ignore malformed */ }
    });

    eventSource.addEventListener("error", function () {
      setConnectionStatus(false);
      eventSource.close();
      // Auto-reconnect after 3 seconds
      if (!reconnectTimer) {
        reconnectTimer = setTimeout(function () {
          reconnectTimer = null;
          connectLogStream();
        }, 3000);
      }
    });
  }

  // ── CONFIRM DIALOG ──
  function showConfirm(title, msg, onConfirm) {
    var overlay = document.createElement("div");
    overlay.className = "dialog-overlay";
    overlay.innerHTML =
      '<div class="dialog-box">' +
        '<div class="dialog-title">' + escHtml(title) + '</div>' +
        '<div class="dialog-msg">' + escHtml(msg) + '</div>' +
        '<div class="dialog-actions">' +
          '<button class="dialog-cancel">Cancel</button>' +
          '<button class="dialog-confirm">Confirm</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector(".dialog-cancel").addEventListener("click", function () {
      document.body.removeChild(overlay);
    });
    overlay.querySelector(".dialog-confirm").addEventListener("click", function () {
      document.body.removeChild(overlay);
      onConfirm();
    });
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) document.body.removeChild(overlay);
    });
  }

  // ── TOAST ──
  function showToast(msg) {
    var toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function () {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
  }

  // ── NUKE BY PREFIX ──
  window.__nukePrefix = function (prefix, event) {
    if (event) { event.stopPropagation(); }
    var matching = instances.filter(function (i) { return i.name.startsWith(prefix + "/") || i.name === prefix; });
    showConfirm(
      "Nuke prefix",
      "Delete all instances under \"" + prefix + "/\"? (" + matching.length + " instance" + (matching.length !== 1 ? "s" : "") + ") This will cancel active invocations.",
      function () {
        fetch("/v1/instances/" + encodeURIComponent(prefix), { method: "DELETE" })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            showToast("Deleted " + (data.deleted || 0) + " instance(s)");
            fetchInstances();
          })
          .catch(function () { showToast("Nuke failed"); });
      }
    );
  };

  // ── NUKE SINGLE INSTANCE ──
  window.__nukeInstance = function (name) {
    showConfirm(
      "Delete instance",
      "Delete instance \"" + name + "\"? This will cancel any active invocation.",
      function () {
        fetch("/v1/instances/" + encodeURIComponent(name), { method: "DELETE" })
          .then(function (res) {
            if (res.ok) {
              showToast("Deleted \"" + name + "\"");
              selectedInstance = null;
              showLogView();
              fetchInstances();
            } else {
              return res.json().then(function (d) { showToast(d.error || "Delete failed"); });
            }
          })
          .catch(function () { showToast("Delete failed"); });
      }
    );
  };

  // ── NUKE ALL ──
  window.__nukeAll = function () {
    showConfirm(
      "Nuke ALL instances",
      "Delete ALL " + instances.length + " instances? This cannot be undone.",
      function () {
        // Double confirm
        showConfirm(
          "Are you sure?",
          "This will permanently delete ALL instances and cancel all active invocations.",
          function () {
            fetch("/v1/instances/", { method: "DELETE" })
              .then(function (res) { return res.json(); })
              .then(function (data) {
                showToast("Deleted " + (data.deleted || 0) + " instance(s)");
                selectedInstance = null;
                showLogView();
                fetchInstances();
              })
              .catch(function () { showToast("Nuke All failed"); });
          }
        );
      }
    );
  };

  // ── SEND MESSAGE ──
  var responseArea = document.getElementById("response-area");
  var responseContent = document.getElementById("response-content");
  var sendBtn = document.getElementById("send-btn");
  var sendPromptInput = document.getElementById("send-prompt");
  var activeSendAbort = null;

  window.__sendMessage = function () {
    var instanceName = sendInstanceSelect.value;
    var prompt = sendPromptInput.value.trim();
    if (!instanceName) { showToast("Select an instance first"); return; }
    if (!prompt) { showToast("Enter a message"); return; }

    // Disable send while streaming
    sendBtn.disabled = true;
    sendPromptInput.value = "";

    // Show response area
    responseContent.innerHTML = "";
    responseArea.classList.add("visible");

    activeSendAbort = new AbortController();

    fetch("/v1/instances/" + encodeURIComponent(instanceName) + "/invoke", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: prompt }),
      signal: activeSendAbort.signal,
    }).then(function (res) {
      if (!res.ok) {
        return res.json().then(function (d) {
          responseContent.textContent = "Error: " + (d.error || res.statusText);
          sendBtn.disabled = false;
        });
      }

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";

      function processChunk() {
        reader.read().then(function (result) {
          if (result.done) {
            sendBtn.disabled = false;
            fetchInstances();
            return;
          }

          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith("data: ")) {
              try {
                var event = JSON.parse(line.substring(6));
                renderResponseEvent(event);
              } catch (_) { /* skip malformed */ }
            }
          }

          processChunk();
        }).catch(function () {
          sendBtn.disabled = false;
        });
      }

      processChunk();
    }).catch(function (err) {
      if (err.name !== "AbortError") {
        responseContent.textContent = "Error: " + err.message;
      }
      sendBtn.disabled = false;
    });
  };

  function renderResponseEvent(event) {
    if (event.type === "assistant_text") {
      // Append text content
      var textNode = document.createTextNode(event.text || "");
      responseContent.appendChild(textNode);
      responseArea.scrollTop = responseArea.scrollHeight;
    } else if (event.type === "tool_use") {
      var toolDiv = document.createElement("div");
      toolDiv.className = "response-tool";
      toolDiv.textContent = "Tool: " + (event.name || "unknown") + (event.input ? " — " + JSON.stringify(event.input).substring(0, 100) : "");
      responseContent.appendChild(toolDiv);
      responseArea.scrollTop = responseArea.scrollHeight;
    } else if (event.type === "done") {
      var summary = document.createElement("div");
      summary.className = "response-summary";
      summary.textContent = "Done — " + (event.turns || 0) + " turns, $" + ((event.costUsd || 0).toFixed(4)) + ", " + (event.durationMs || 0) + "ms";
      responseContent.appendChild(summary);
      responseArea.scrollTop = responseArea.scrollHeight;
    } else if (event.type === "error") {
      var errDiv = document.createElement("div");
      errDiv.style.color = "var(--red)";
      errDiv.textContent = "Error: " + (event.error || "unknown");
      responseContent.appendChild(errDiv);
    }
  }

  window.__closeResponse = function () {
    responseArea.classList.remove("visible");
    if (activeSendAbort) {
      activeSendAbort.abort();
      activeSendAbort = null;
    }
  };

  // Enter key sends message
  sendPromptInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      window.__sendMessage();
    }
  });

  // ── INIT ──
  fetchInstances();
  refreshTimer = setInterval(fetchInstances, 5000);
  connectLogStream();
})();
</script>
</body>
</html>
